<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | HydrogenHub</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .verify-container {
            max-width: 500px;
            margin: 6rem auto;
            padding: 3rem 2rem;
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-cyan);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #verify-success, #verify-error {
            display: none;
            margin-top: 1rem;
        }
        #verify-success h2 {
            color: var(--accent-green);
            margin-bottom: 0.5rem;
        }
        #verify-error h2 {
            color: #ff6666;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body class="theme-dark">

    <nav class="glass-nav">
        <div class="nav-container">
            <a href="index.html" class="logo" style="text-decoration: none;">Hydro<span>Hub</span></a>
        </div>
    </nav>

    <main class="verify-container glass-card">
        <div id="verify-loading">
            <div class="spinner"></div>
            <h2>Verifying your email...</h2>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Please wait while we confirm your account.</p>
        </div>

        <div id="verify-success">
            <h2>Email Verified! 🚀</h2>
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Your account is now fully active. You can log in and start contributing to the community.</p>
            <a href="index.html" class="btn btn-primary" style="text-decoration: none;">Go to Login</a>
        </div>

        <div id="verify-error">
            <h2>Verification Failed</h2>
            <p id="verify-error-msg" style="color: var(--text-secondary); margin-bottom: 1.5rem;">The link may have expired or is invalid.</p>
            <a href="index.html" class="btn btn-outline" style="text-decoration: none;">Return Home</a>
        </div>
    </main>

    <script type="module" src="verify.js"></script>
</body>
</html>
