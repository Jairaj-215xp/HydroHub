<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup | HydrogenHub</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .profile-setup-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 2rem;
            text-align: center;
        }
        .profile-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
            text-align: left;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group label {
            font-weight: bold;
            color: var(--text-primary);
        }
    </style>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("5r89OIM2TiHt2jU4O"); // User needs to inject their public key
       })();
    </script>
</head>
<body class="theme-dark">

    <nav class="glass-nav">
        <div class="nav-container">
            <div class="logo">
                <h1>HydroHub</h1>
            </div>
        </div>
    </nav>

    <main class="profile-setup-container glass-card">
        <h2>Complete Your Profile</h2>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">Tell us a bit about yourself before you join the community.</p>

        <div class="profile-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="profile-name" class="glass-input" placeholder="e.g. Jane Doe">
            </div>
            
            <div class="form-group">
                <label>Unique Username</label>
                <input type="text" id="profile-username" class="glass-input" placeholder="e.g. janedoe123">
            </div>

            <div class="form-group">
                <label>Display Name (Shown on your uploads)</label>
                <input type="text" id="profile-display" class="glass-input" placeholder="e.g. Dr. Jane D.">
            </div>

            <div class="form-group">
                <label>Bio</label>
                <textarea id="profile-bio" class="glass-input" placeholder="Tell the community about yourself..." rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>University / Organization</label>
                <input type="text" id="profile-university" class="glass-input" placeholder="e.g. MIT">
            </div>

            <div class="form-group">
                <label>Field of Study</label>
                <input type="text" id="profile-field-study" class="glass-input" placeholder="e.g. Quantum Physics, Computational Biology">
            </div>

            <p id="profile-error" class="error-text" style="color: #ff6666; display: none;"></p>
            <p id="profile-success" class="success-text" style="color: var(--accent-cyan); display: none;"></p>

            <button id="btn-save-profile" class="btn btn-primary" style="margin-top: 1rem;">Complete Setup</button>
        </div>
    </main>

    <script type="module" src="profile-setup.js"></script>
</body>
</html>
