<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup | HydrogenHub</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/index.css">
    <style>
        .profile-setup-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 2rem;
            text-align: center;
        }
        .profile-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
            text-align: left;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group label {
            font-weight: bold;
            color: var(--text-primary);
        }
    </style>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("5r89OIM2TiHt2jU4O"); // User needs to inject their public key
       })();
    </script>
</head>
<body>

    <!-- Background Elements for Animations -->
    <div class="bg-gradient"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <nav class="navbar hidden-element">
        <div class="nav-container">
            <a href="index.html" class="logo">Hydro<span>Hub</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
            </ul>
        </div>
    </nav>

    <main class="profile-setup-container glass-card" style="position: relative; z-index: 10;">
        <h2 style="font-family: var(--font-heading);">Complete Your Profile</h2>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">Tell us a bit about yourself before you join the community.</p>

        <div class="profile-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="profile-name" class="glass-input" placeholder="e.g. Jane Doe">
            </div>
            
            <div class="form-group">
                <label>Unique Username</label>
                <input type="text" id="profile-username" class="glass-input" placeholder="e.g. janedoe123">
            </div>

            <div class="form-group">
                <label>Display Name (Shown on your uploads)</label>
                <input type="text" id="profile-display" class="glass-input" placeholder="e.g. Dr. Jane D.">
            </div>

            <div class="form-group">
                <label>Bio</label>
                <textarea id="profile-bio" class="glass-input" placeholder="Tell the community about yourself..." rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>University / Organization</label>
                <input type="text" id="profile-university" class="glass-input" placeholder="e.g. MIT">
            </div>

            <div class="form-group">
                <label>Field of Study</label>
                <input type="text" id="profile-field-study" class="glass-input" placeholder="e.g. Quantum Physics, Computational Biology">
            </div>

            <p id="profile-error" class="error-text" style="color: #ff6666; display: none;"></p>
            <p id="profile-success" class="success-text" style="color: var(--accent-cyan); display: none;"></p>

            <button id="btn-save-profile" class="btn btn-primary" style="margin-top: 1rem;">Complete Setup</button>
        </div>
    </main>

    <script type="module" src="js/profile-setup.js"></script>
</body>
</html>
